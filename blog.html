<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights & Articles | M.Nekookar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .blog-page-wrapper { max-width: 800px; margin: 120px auto 80px; padding: 0 20px; }
        .blog-archive-list { margin-top: 50px; }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <div class="ambient-light light-purple"></div>

    <nav class="navbar fade-in">
        <div class="nav-inner">
            <a href="index.html" class="brand">M<span class="dot">.</span>Nekookar</a>
            <div class="nav-menu">
                <a href="index.html#work">Work</a>
                <a href="index.html#expertise">Expertise</a>
                <a href="blog.html" class="active-link">Insights</a>
            </div>
            <a href="mailto:moh.nek@aut.ac.ir" class="btn-contact">Let's Talk</a>
        </div>
    </nav>

    <div class="blog-page-wrapper fade-in delay-1">
        <h1>Insights Archive</h1>
        <p style="color: var(--text-muted);">Thoughts on engineering, code, and maritime technology.</p>
        
        <div id="archive-container" class="blog-archive-list"></div>
    </div>

    <footer>
        <p>© 2026 M.Nekookar. All rights reserved.</p>
    </footer>

    <script src="assets/js/blog-data.js"></script>
    <script>
        const container = document.getElementById('archive-container');
        
        // حلقه برای نمایش تمام مقالات
        blogPosts.forEach(post => {
            const articleHTML = `
                <a href="${post.link}" class="blog-row fade-in">
                    <div class="blog-date">${post.date}</div>
                    <div class="blog-info">
                        <h4>${post.title}</h4>
                        <span>${post.subtitle}</span>
                    </div>
                    <div class="blog-arrow">&rarr;</div>
                </a>
            `;
            container.innerHTML += articleHTML;
        });
    </script>
</body>
</html>
